# docker-compose.yml — local development with hot-reload
# =========================================================
# The model binary is NOT in git (~837 MB).
# It is mounted from your local models/ directory.
#
# Usage:
#   docker compose up --build
#
# If you want auto-download instead of mounting, set MODEL_URL:
#   MODEL_URL=https://... docker compose up --build

version: "3.9"

services:
  # ── Flask REST API ─────────────────────────────────────────────────────────
  api:
    build: .
    image: visa-estimator:latest
    command: >
      gunicorn app:app
        --workers 2
        --timeout 120
        --bind 0.0.0.0:5000
        --reload
        --access-logfile -
        --error-logfile -
    ports:
      - "5000:5000"
    volumes:
      - .:/app                        # mount source for hot-reload
      - ./models:/app/models          # mount model binary (best_model.joblib)
    environment:
      - DEBUG=true
      - PORT=5000
      # Uncomment to enable auto-download instead of using the volume:
      # - MODEL_URL=https://your-storage/best_model.joblib
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  ui:
    build: .
    image: visa-estimator:latest
    command: >
      streamlit run streamlit_app.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
        --browser.gatherUsageStats=false
    ports:
      - "8501:8501"
    volumes:
      - .:/app                        # mount source for hot-reload
      - ./models:/app/models          # mount model binary
    environment:
      - API_URL=http://api:5000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
