# GitHub Actions — Deploy Streamlit to Streamlit Community Cloud
# OR push Docker image to Docker Hub for any cloud host
# ==============================================================
# Secrets required:
#   DOCKER_USERNAME   — Docker Hub username
#   DOCKER_PASSWORD   — Docker Hub access token
#
# After push, deploy the image on:
#   - AWS ECS / App Runner
#   - Azure Container Apps
#   - Google Cloud Run
#   - Heroku Container Registry
#   - Railway, Render, Fly.io

name: Build & Push Docker Image

on:
  push:
    # Only trigger on version tags, not on every push to main
    # (Docker secrets DOCKER_USERNAME/DOCKER_PASSWORD must be configured)
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/visa-estimator

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context:    .
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
