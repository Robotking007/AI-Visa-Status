# GitHub Actions — CI + Deploy to Azure Web App
# ===============================================
# NOTE: The trained model (best_model.joblib, ~837 MB) is NOT stored in git.
# It must be provided at runtime via one of:
#   a) Azure App Service → Configuration → Path mappings (persistent storage)
#   b) Set MODEL_URL secret to a public/SAS-signed URL; the app downloads on first start
#   c) Mount an Azure File Share to /app/models/
#
# Required GitHub Secrets:
#   AZURE_WEBAPP_PUBLISH_PROFILE  — from Azure Portal → Web App → Deployment Center
#   AZURE_WEBAPP_NAME             — e.g. "visa-estimator"
# Optional:
#   MODEL_URL                     — HTTPS URL to best_model.joblib (enables auto-download)

name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-validate:
    name: Lint & Code Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Validate imports and module structure without loading the model binary
      - name: Validate module imports
        run: |
          python -c "
          import importlib, sys

          # Verify all web-app modules are importable
          for mod in ['flask', 'flask_cors', 'joblib', 'sklearn', 'pandas', 'numpy',
                      'streamlit', 'requests', 'xgboost', 'lightgbm']:
              importlib.import_module(mod)
              print(f'  OK: {mod}')

          # Check predictor syntax (do NOT instantiate — model binary not in repo)
          import ast, pathlib
          for src in ['predictor.py', 'app.py', 'streamlit_app.py', 'test_webapp.py', 'download_model.py']:
              ast.parse(pathlib.Path(src).read_text(encoding='utf-8'))
              print(f'  OK syntax: {src}')

          print('All import and syntax checks passed.')
          "

      # Verify models/ metadata files (JSON — are tracked in git)
      - name: Validate model metadata
        run: |
          python -c "
          import json, pathlib
          for f in ['models/feature_names.json', 'models/training_report.json']:
              data = json.loads(pathlib.Path(f).read_text())
              print(f'  OK: {f} ({len(str(data))} chars)')
          print('Model metadata OK.')
          "

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: lint-and-validate
    # Only deploy when the Azure publish-profile secret is configured
    if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package:         .
